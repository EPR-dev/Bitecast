<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Bitecast  Forecast the bite at Fiesta Island">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a72b8" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#0a72b8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a72b8" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative tide waves at bottom -->
  <path d="M0 520 Q 200 470 400 520 T 800 520 T 1200 520 L 1200 630 L 0 630 Z" fill="url(#wave)"/>
  <path d="M0 560 Q 200 530 400 560 T 800 560 T 1200 560 L 1200 630 L 0 630 Z" fill="#0a72b8" fill-opacity="0.25"/>

  <!-- Brand mark: dot inside circle, tide pulse -->
  <g transform="translate(110 200)">
    <circle cx="40" cy="40" r="40" fill="#0a72b8"/>
    <circle cx="40" cy="40" r="14" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <text x="220" y="252" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-weight="800" font-size="108" fill="#075584" letter-spacing="-2">Bitecast</text>

  <!-- Tagline -->
  <text x="110" y="340" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-weight="600" font-size="42" fill="#0f172a" letter-spacing="-0.5">Forecast the bite at Fiesta Island.</text>

  <!-- Sub -->
  <text x="110" y="390" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-weight="400" font-size="28" fill="#475569">A tide-aware, species-aware fishing demo. Mission Bay, San Diego.</text>

  <!-- Pills -->
  <g font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-weight="700" font-size="22" fill="#075584">
    <g>
      <rect x="110" y="440" rx="22" ry="22" width="200" height="44" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
      <text x="210" y="470" text-anchor="middle">Tide-aware</text>
    </g>
    <g>
      <rect x="330" y="440" rx="22" ry="22" width="240" height="44" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
      <text x="450" y="470" text-anchor="middle">Species-aware</text>
    </g>
    <g>
      <rect x="590" y="440" rx="22" ry="22" width="220" height="44" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
      <text x="700" y="470" text-anchor="middle">Offline-first</text>
    </g>
    <g>
      <rect x="830" y="440" rx="22" ry="22" width="180" height="44" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
      <text x="920" y="470" text-anchor="middle">No install</text>
    </g>
  </g>

  <!-- URL -->
  <text x="110" y="555" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="700" font-size="24" fill="#0a72b8">epr-dev.github.io/Bitecast</text>
</svg>
